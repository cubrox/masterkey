name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # REQUIRED: preview-deploy.yml calls this workflow via
  # `uses: ./.github/workflows/ci.yml`. Without workflow_call here,
  # GitHub silently shows "0 jobs" with no useful error.
  # See docs/PATTERN-LIBRARY.md #16
  workflow_call:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: |
            **/*.md
            !node_modules
            !starters/**
          config: '.markdownlint.json'

  # Split from the former `typecheck` umbrella (upstream PR vibeacademy/gembaflow#428;
  # local backport per fork ticket #233). The two checks below run different things and
  # fail for different reasons, so they're now separate jobs whose failure messages
  # match their purpose. Branch protection ruleset 15886599 should require both.
  json-validate:
    name: json-validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate JSON files
        run: ./scripts/validation/validate-json.sh

  version-parity:
    name: version-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate version parity
        run: ./scripts/validation/validate-version-parity.sh

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Validate shell scripts
        run: ./scripts/validation/validate-scripts.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate command files
        run: ./scripts/validation/validate-commands.sh

      - name: Validate agent files
        run: ./scripts/validation/validate-agents.sh

  lint-agent-policies:
    name: lint-agent-policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate agent policies
        run: ./scripts/validation/validate-agent-policies.sh

      - name: Lint agent policies for prohibited instructions
        run: ./scripts/lint-agent-policies.sh

      - name: Verify agent restrictions (protocol and docs)
        run: ./scripts/verify-agent-restrictions.sh --test protocol && ./scripts/verify-agent-restrictions.sh --test docs

  actionlint:
    # Static checker for GitHub Actions YAML. Catches workflow-level
    # bugs that bash shellcheck and project tests can't reach:
    #   - `secrets.*` referenced inside `if:` expressions (#29 class)
    #   - Unknown action inputs e.g. dropped `service_account` arg
    #     (#32 class)
    #   - Malformed expressions, undefined contexts
    #
    # Filed as #37 after three workflow YAML bugs reached `main` in
    # earlier sessions (#27, #29, #32). actionlint validates workflow
    # structure and recognized action inputs; it does NOT shellcheck
    # the contents of free-form strings (e.g. gcloud `flags:` values).
    # Bugs in that class — like #76 (`--traffic=latest=100` rejected
    # by gcloud at runtime) — need a separate guard, e.g. an end-to-end
    # deploy in CI or a curated allowlist of known gcloud flags.
    #
    # Job runs on every PR (not path-filtered): actionlint is <5s and
    # the overhead vs. introducing a paths-filter dependency is
    # negligible. Suppression rules in .github/actionlint.yaml keep
    # the lint posture aligned with scripts/validation/validate-scripts.sh.
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install actionlint
        id: get_actionlint
        # Pin to a specific version so workflow lint behavior doesn't
        # change silently across runs. The download-and-exec pattern
        # is the rhysd-recommended integration; avoids depending on a
        # third-party action wrapper.
        run: |
          bash <(curl -fsS https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          echo "executable=${{ github.workspace }}/actionlint" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color -config-file .github/actionlint.yaml
        shell: bash

  python:
    name: python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for Python project
        id: check_python
        run: |
          if [ -f "pyproject.toml" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No pyproject.toml found -- skipping Python checks."
          fi

      - name: Install uv
        if: steps.check_python.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v8.1.0

      - name: Lint with ruff
        if: steps.check_python.outputs.skip != 'true'
        run: uv run --extra dev ruff check .

      - name: Check formatting with ruff
        # Formatter coverage was previously provided by the now-deleted
        # auto-fix.yml workflow (#93). Without this step a contributor
        # could pass `ruff check` and still introduce formatter-style
        # violations (quote style, trailing commas, function-call wrap).
        if: steps.check_python.outputs.skip != 'true'
        run: uv run --extra dev ruff format . --check

      - name: Type check with mypy
        if: steps.check_python.outputs.skip != 'true'
        continue-on-error: true
        run: |
          uv run --extra dev pip install mypy 2>/dev/null || true
          uv run --extra dev mypy . --ignore-missing-imports || echo "mypy not configured -- skipping"

      - name: Run tests with coverage
        if: steps.check_python.outputs.skip != 'true'
        run: |
          uv run --extra dev pytest --tb=short -q --cov --cov-report=term-missing --cov-fail-under=${COVERAGE_THRESHOLD:-80}

      - name: Run BDD tests
        # Legitimate opt-out (per #52 silent-skip audit): hashFiles('') == '' when
        # the fork has no `features/*.feature` files. Many forks of this template
        # don't ship BDD tests — the empty result means "no BDD features in this
        # repo," not "feature collection failed." Keep as a skip-when-absent
        # gate, NOT a silent-failure cascade.
        if: steps.check_python.outputs.skip != 'true' && hashFiles('features/*.feature') != ''
        run: uv run --extra dev pytest --tb=short -q features/

  node:
    name: node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for Node.js project
        id: check_node
        run: |
          if [ -f "package.json" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No package.json found -- skipping Node.js checks."
          fi

      - name: Setup Node.js
        if: steps.check_node.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.check_node.outputs.skip != 'true'
        run: npm ci

      - name: Lint
        if: steps.check_node.outputs.skip != 'true'
        run: npm run lint

      - name: Type check
        if: steps.check_node.outputs.skip != 'true'
        run: npm run typecheck

      - name: Test
        if: steps.check_node.outputs.skip != 'true'
        run: npm test

      - name: Build
        if: steps.check_node.outputs.skip != 'true'
        run: npm run build

  a11y:
    # Accessibility & WCAG gate (A11Y-3 #26). Boots the FastAPI app with
    # MASTERKEY_TEST_SEED_ENABLED=true so the test-only seed router is
    # mounted, then runs Playwright + axe-core against the reading
    # surface across four preference variants. Zero serious/critical
    # WCAG 2.0 A+AA violations is the merge gate.
    #
    # Scope: only triggers on the workflow's existing triggers (push to
    # main, pull_request to main, workflow_call from preview-deploy.yml).
    # No path filters — a change to templates/, app/, or pyproject.toml
    # can all regress the surface, so always run.
    name: a11y
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install Python dependencies
        run: uv sync --extra dev

      # Local Supabase stack for the a11y harness (#97). The seed
      # router calls the real Supabase admin + auth APIs to mint a
      # session JWT; without a backend to talk to those calls would
      # fail. The CLI's local stack runs in Docker (pre-installed on
      # ubuntu-latest), applies supabase/migrations/*.sql automatically,
      # and exposes itself on http://127.0.0.1:54321.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        # `supabase status -o json` returns the freshly-generated keys
        # + DB URL for the local stack; we export them to GITHUB_ENV
        # so the Playwright step (and the uvicorn subprocess it spawns)
        # can read them without hard-coding values (the local-default
        # JWTs drift across CLI versions).
        #
        # DATABASE_URL points at the local Supabase Postgres so the
        # Passage / Preference INSERTs land in the same DB the migrations
        # already populated. Without this the subprocess falls back to
        # `sqlite:///./dev.db` (the pydantic default) which has no
        # schema applied — INSERTs fail with `no such table: passage`.
        run: |
          supabase start
          {
            echo "SUPABASE_URL=$(supabase status -o json | jq -r '.API_URL')"
            echo "SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')"
            echo "SUPABASE_SERVICE_KEY=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')"
            echo "DATABASE_URL=$(supabase status -o json | jq -r '.DB_URL')"
          } >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'tests/a11y/package-lock.json'

      - name: Install Node dependencies
        working-directory: tests/a11y
        run: npm ci

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: tests/a11y
        # Read the pinned version from package-lock.json so the cache
        # key changes when the bump lands.
        run: |
          version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers + OS deps
        working-directory: tests/a11y
        # `--with-deps` runs apt-get install for libglib/libnss/etc. on
        # every job (not cached), but the heavy browser-binary download
        # is gated by the cache step above.
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        working-directory: tests/a11y
        # MASTERKEY_TEST_SEED_ENABLED, SESSION_COOKIE_SECURE, and
        # ENVIRONMENT are also set inside playwright.config.ts >
        # webServer.env, so the FastAPI subprocess sees them
        # regardless of whether the job-level env propagates.
        # SUPABASE_* come from $GITHUB_ENV (set by the "Start local
        # Supabase stack" step above) and are forwarded into the
        # uvicorn subprocess by playwright.config.ts.
        env:
          MASTERKEY_TEST_SEED_ENABLED: 'true'
          SESSION_COOKIE_SECURE: 'false'
          ENVIRONMENT: 'test'
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report-${{ github.sha }}
          path: tests/a11y/playwright-report/
          retention-days: 14
          if-no-files-found: ignore
